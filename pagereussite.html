<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      text-align: center;
      color: black;
    }
    .container { padding: 20px; }
    .main { font-size: 52px; font-weight: bold; margin-bottom: 30px; }
    .sub { font-size: 28px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="main">Good job—you got it all right!</div>
    <div class="sub">Now click the X at the top to close this window<br>and go see my colleague on the right side of the room.</div>
  </div>
</body>
</html>
